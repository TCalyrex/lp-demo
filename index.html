<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f7f3ec; }
  .lp { max-width: 860px; margin: 0 auto; background: #fff; }
  .lp img { display: block; width: 100%; height: auto; }

  /* 画像の上に重ねる「透明な当たり判定」。
     位置は画像に対する%指定なので、スマホでもPCでも自動でついてくる */
  .sec { position: relative; }
  .hotspot {
    position: absolute; display: block; z-index: 10;
    border-radius: 40px; cursor: pointer;
    -webkit-tap-highlight-color: transparent; /* スマホ標準の灰色フラッシュを消す */
    transition: transform .06s ease, background .06s ease;
    overflow: hidden; /* シャインをボタンの形で切り抜く */
  }
  /* 数秒おきにボタンの上を光が走る */
  .hotspot::after {
    content: ""; position: absolute; top: 0; left: -80%;
    width: 45%; height: 100%;
    background: linear-gradient(115deg, transparent, rgba(255,255,255,.5), transparent);
    transform: skewX(-20deg);
    animation: shine 3.8s ease-in-out infinite;
  }
  @keyframes shine {
    0%   { left: -80%; }
    38%  { left: 130%; }
    100% { left: 130%; }
  }
  /* 目の疲れ・酔いに配慮した設定のユーザーには動きを止める */
  @media (prefers-reduced-motion: reduce) {
    .hotspot::after, .floating-cta { animation: none; }
  }
  .hotspot:hover { box-shadow: 0 0 0 3px rgba(46,158,82,.55); }
  /* 押した瞬間：うっすら暗くして少し縮める＝ボタンが沈んで見える */
  .hotspot:active {
    background: rgba(0,0,0,.14);
    transform: scale(.97);
    box-shadow: inset 0 2px 6px rgba(0,0,0,.25);
  }

  /* 画面下に追従するCTAボタン */
  .floating-cta {
    position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
    width: min(92%, 480px); z-index: 100;
    background: linear-gradient(135deg, #1a7a3a, #2e9e52);
    color: #fff; text-align: center; text-decoration: none;
    font-size: 17px; font-weight: bold; font-family: sans-serif;
    padding: 16px 8px; border-radius: 40px;
    box-shadow: 0 4px 16px rgba(0,0,0,.25);
  }
  .floating-cta:active { transform: translateX(-50%) scale(.97); }
  /* ページ最下部のフッター（法的表記へのリンク） */
  .footer {
    background: #2b2b2b; color: #ccc; font-family: sans-serif;
    text-align: center; font-size: 12px;
    padding: 28px 12px 90px; /* 下は追従バーと重ならない余白 */
  }
  .footer a { color: #ccc; text-decoration: none; margin: 0 10px; }
  .footer a:hover { color: #fff; text-decoration: underline; }
  .footer .copy { margin-top: 14px; color: #888; }
</style>
